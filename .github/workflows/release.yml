name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            os_tag: linux
            arch_tag: x86_64
            use_cross: false
            binary_name: orivo
            asset_suffix: ""

          # Linux aarch64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            os_tag: linux
            arch_tag: aarch64
            use_cross: true
            binary_name: orivo
            asset_suffix: ""

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            os_tag: macos
            arch_tag: x86_64
            use_cross: false
            binary_name: orivo
            asset_suffix: ""

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            os_tag: macos
            arch_tag: aarch64
            use_cross: false
            binary_name: orivo
            asset_suffix: ""

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            os_tag: windows
            arch_tag: x86_64
            use_cross: false
            binary_name: orivo.exe
            asset_suffix: ".exe"

          # Windows aarch64
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            os_tag: windows
            arch_tag: aarch64
            use_cross: false
            binary_name: orivo.exe
            asset_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Linux native deps (sqlite3 required by sqlx-sqlite)
      - name: Install system dependencies (Linux native)
        if: matrix.os == 'ubuntu-latest' && matrix.use_cross == false
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BINARY_ASSET="orivo-${VERSION}-${{ matrix.os_tag }}-${{ matrix.arch_tag }}${{ matrix.asset_suffix }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$BINARY_ASSET"
          if [ "${{ matrix.os_tag }}" != "windows" ]; then
            chmod +x "$BINARY_ASSET"
          fi
          echo "BINARY_ASSET=$BINARY_ASSET" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: orivo-${{ matrix.os_tag }}-${{ matrix.arch_tag }}
          path: ${{ env.BINARY_ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stamp install script tag
        run: |
          sed -i "s|__ORIVO_RELEASE_TAG__|${GITHUB_REF_NAME}|g" bin/install.sh

      - name: Prepare release assets
        run: |
          cp bin/install.sh dist/install.sh
          cp xdg/orivo-kitty.desktop dist/orivo-kitty.desktop
          cp xdg/orivo-alacritty.desktop dist/orivo-alacritty.desktop
          cp xdg/orivo.svg dist/orivo.svg

      - name: Generate checksums
        run: |
          cd dist
          sha256sum orivo-v* install.sh orivo-kitty.desktop orivo-alacritty.desktop orivo.svg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/orivo-v*
            dist/SHA256SUMS.txt
            dist/install.sh
            dist/orivo-kitty.desktop
            dist/orivo-alacritty.desktop
            dist/orivo.svg
          generate_release_notes: true
